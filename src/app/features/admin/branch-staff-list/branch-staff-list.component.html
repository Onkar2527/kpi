<div class="container mt-4">
  <h2>Branch Staff List</h2>

  <div class="mb-3 d-flex align-items-center gap-2">
  
  <input
    type="text"
    class="form-control"
    placeholder="Search..."
    [(ngModel)]="searchTerm"
    (ngModelChange)="onSearch()"
  />

  <button class="btn btn-primary btn-sm rounded-4" (click)="exportToExcel()">
    Export to Excel
  </button>

</div>

  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>PF NO</th>
        <th>Name</th>
        <th>Designation</th>
        <th>Branch Code</th>
        <th>Branch Name</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of paginatedUsers">
        <td>{{ user.PF_NO }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.role }}</td>
        <td>{{ user.branch_id }}</td>
        <td>{{ user.branch_name }}
      </tr>
    </tbody>
  </table>

  <nav *ngIf="totalPages > 1">
  <ul class="pagination justify-content-center">
    <li class="page-item" [class.disabled]="currentPage === 1">
      <a class="page-link" href="#" (click)="goToPage($event, currentPage - 1)">Previous</a>
    </li>

    <li
      class="page-item"
      *ngFor="let page of visiblePages"
      [class.active]="currentPage === page"
    >  
      <a class="page-link" href="#" (click)="goToPage($event, page)">{{ page }}</a>
    </li>

    <li class="page-item" [class.disabled]="currentPage === totalPages">
      <a class="page-link" href="#" (click)="goToPage($event, currentPage + 1)">Next</a>
    </li>
  </ul>
</nav>
  </div>
